<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description"
    content="MediVerify — Medicine Verification System. Verify the authenticity and details of medicines through our trusted database." />
  <title>MediVerify — Medicine Verification System</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
</head>

<body>
  <!-- ===== TOP STATUS BAR ===== -->
  <div class="status-bar" id="statusBar">
    <span class="status-dot"></span>
    <span id="statusText">Connecting to Verification Database…</span>
  </div>

  <!-- ===== HEADER ===== -->
  <header class="header" id="appHeader">
    <div class="header-inner">
      <div class="brand">
        <div class="brand-icon">
          <svg viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
            <rect x="2" y="2" width="36" height="36" rx="8" stroke="currentColor" stroke-width="2.5" />
            <path d="M20 10V30M10 20H30" stroke="currentColor" stroke-width="3" stroke-linecap="round" />
            <circle cx="20" cy="20" r="14" stroke="currentColor" stroke-width="1.5" opacity="0.3" />
          </svg>
        </div>
        <div>
          <h1 class="brand-name">MediVerify</h1>
          <p class="brand-tagline">Medicine Verification System</p>
        </div>
      </div>
      <nav class="nav" id="mainNav"></nav>
    </div>
  </header>

  <!-- ===== MAIN CONTENT ===== -->
  <main class="main" id="mainContent">
    <!-- Content injected by JS -->
  </main>

  <!-- ===== FOOTER ===== -->
  <footer class="footer">
    <div class="footer-inner">
      <p>&copy; 2026 MediVerify — Medicine Verification System</p>
      <p class="footer-disclaimer">This is a database-verified system for demonstration purposes. Not affiliated with
        any government body.</p>
    </div>
  </footer>

  <!-- ===== MODAL OVERLAY ===== -->
  <div class="modal-overlay" id="modalOverlay">
    <div class="modal" id="modalContent"></div>
  </div>

  <!-- ===== SCRIPTS ===== -->
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
  <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
  <script src="js/medicines.js"></script>
  <script src="js/database.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/scanner.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/app.js"></script>
</body>

</html>
